services:
  app:
    build: .
    image: aiagentcomm-app-slim:latest
    container_name: sfim-ai-agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      FLASK_DEBUG: "0"
      LOG_LEVEL: INFO
      LOG_FORMAT: json
      GUNICORN_WORKERS: 2
      GUNICORN_TIMEOUT: 180
      MAX_CONTENT_LENGTH_MB: 2
      RAW_DATA_DIR: /app/data/raw
      PROCESSED_DATA_DIR: /app/data/processed
      CHROMA_DIR: /app/chromadb_store
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - raw_data:/app/data/raw
      - processed_data:/app/data/processed
      - chroma_store:/app/chromadb_store

  ingest:
    build: .
    image: aiagentcomm-app-slim:latest
    container_name: sfim-ai-agent-ingest
    profiles:
      - ingest
    restart: "no"
    env_file:
      - .env
    environment:
      APP_ENV: production
      FLASK_DEBUG: "0"
      LOG_LEVEL: INFO
      LOG_FORMAT: json
      RAW_DATA_DIR: /app/data/raw
      PROCESSED_DATA_DIR: /app/data/processed
      CHROMA_DIR: /app/chromadb_store
    command: ["python", "-m", "app.cli", "ingest"]
    volumes:
      - raw_data:/app/data/raw
      - processed_data:/app/data/processed
      - chroma_store:/app/chromadb_store

volumes:
  raw_data:
  processed_data:
  chroma_store:
