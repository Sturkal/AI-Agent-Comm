services:
  ollama:
    image: ollama/ollama:latest
    container_name: sfim-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    volumes:
      - ollama_data:/root/.ollama

  ollama-pull:
    image: ollama/ollama:latest
    container_name: sfim-ollama-pull
    profiles:
      - setup
    restart: "no"
    env_file:
      - .env
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama pull ${OLLAMA_MODEL:-llama3.1}
        ollama pull ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
    environment:
      OLLAMA_HOST: http://ollama:11434

  app:
    image: aiagentcomm-app-slim:latest
    container_name: sfim-ai-agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      RAW_DATA_DIR: /app/data/raw
      PROCESSED_DATA_DIR: /app/data/processed
      CHROMA_DIR: /app/chromadb_store
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - ./data/raw:/app/data/raw
      - ./data/processed:/app/data/processed
      - ./chromadb_store:/app/chromadb_store

  ingest:
    image: aiagentcomm-app-slim:latest
    container_name: sfim-ai-agent-ingest
    profiles:
      - ingest
    restart: "no"
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      RAW_DATA_DIR: /app/data/raw
      PROCESSED_DATA_DIR: /app/data/processed
      CHROMA_DIR: /app/chromadb_store
    depends_on:
      ollama:
        condition: service_healthy
    command: ["python", "-m", "app.cli", "ingest"]
    volumes:
      - ./data/raw:/app/data/raw
      - ./data/processed:/app/data/processed
      - ./chromadb_store:/app/chromadb_store

volumes:
  ollama_data:
